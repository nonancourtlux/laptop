- name: First run 
  hosts: localhost
  vars_files:
   - vars/default.yaml 
  tasks:
  - ansible.builtin.file:
      path: "{{item}}"
      state: touch 
    loop:
      - "/root/first_was_here_2"
    ignore_errors: true
  - user:
     name: ubuntu
     state: absent
     remove: yes
  - debug:
     msg: "{{ansible_product_serial)}}"
  - cron:
     job: test -f {{ cc.cloud_init_shell }} && flock -x  /tmp/robot /bin/bash  {{ cc.cloud_init_shell }}
     hour: 10
     minute: "{{ range(0,60) | random(seed=ansible_product_serial)}}"
