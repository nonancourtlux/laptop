- name: First run 
  hosts: localhost
  vars_files:
   - vars/default.yaml 
  tasks:
  - ansible.builtin.file:
      path: "{{item}}"
      state: touch 
    loop:
      - "/root/first_was_here_2"
    ignore_errors: true

  - ansible.builtin.template:
       src: "templates/{{ item }}.j2"
       dest: "{{ cc.cloud_init_shell }}"
    loop:
     - "cloud-init.sh"

  - user:
     name: ubuntu
     state: absent
     remove: yes

  - set_fact:
     myhostname: "{{ 'cc-%03d' | format(range(0,999) | random(seed=ansible_product_serial))  }}"

  - debug:
     msg: 
      - "{{ansible_product_serial}}"
      - "{{ range(0,1000) | random(seed=ansible_product_serial) }}"
      - "{{myhostname}}"

  - cron:
     name: "daily - config"
     job: test -f {{ cc.cloud_init_shell }} && flock -x  /tmp/robot /bin/bash  {{ cc.cloud_init_shell }}
     hour: 10
     minute: "{{ range(0,60) | random(seed=ansible_product_serial) }}"

  - name: "Set a hostname to {{myhostname}}"
    ansible.builtin.hostname:
     name: "{{ myhostname }}"
    notify:
        - reboot
  - ansible.builtin.user:
     name: "{{cc.username}}"
     comment: "{{cc.username}}@{{myhostname}}"
    notify:
        - reboot
 
  handlers:
    - name: reboot
      ansible.builtin.command:
        cmd: /usr/sbin/reboot
